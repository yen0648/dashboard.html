<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Records</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial;
    background: #fffdf0;
    padding: 15px;
    margin: 0;
}

h2 {
    text-align: center;
}

button {
    display: block;
    margin: 10px auto;
    padding: 10px 15px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

/* TABLE WRAPPER */
.table-container {
    width: 100%;
    overflow-x: auto;
}

/* DEFAULT TABLE (DESKTOP) */
table {
    width: 100%;
    border-collapse: collapse;
    background: #e6f0ff;
    min-width: 600px;
}

th {
    background: #007bff;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border: 1px solid #ccc;
    text-align: center;

    /* Prevent overflow */
    word-wrap: break-word;
    overflow-wrap: break-word;
}

/* 📱 MOBILE VIEW */
@media (max-width: 600px) {

    .table-container {
        overflow-x: hidden; /* prevent scroll overflow */
    }

    table, thead, tbody, th, td, tr {
        display: block;
        width: 100%;
    }

    table {
        min-width: 100%;
    }

    thead {
        display: none;
    }

    tr {
        background: white;
        margin-bottom: 15px;
        border: 2px solid #007bff;
        border-radius: 10px;
        padding: 10px;
    }

    td {
        text-align: left;
        border: none;
        padding: 8px;

        /* 🔥 KEY FIXES */
        word-wrap: break-word;
        overflow-wrap: break-word;
        white-space: normal;
    }

    td::before {
        font-weight: bold;
        display: block;
        color: #007bff;
        margin-bottom: 3px;
    }

    td:nth-child(1)::before { content: "Student ID"; }
    td:nth-child(2)::before { content: "Name"; }
    td:nth-child(3)::before { content: "Section"; }
    td:nth-child(4)::before { content: "Reason"; }
    td:nth-child(5)::before { content: "Phone"; }

    /* Optional: limit long reason text */
    td:nth-child(4) {
        max-height: 100px;
        overflow-y: auto;
    }
}

p {
    margin-top: 20px;
    max-width: 400px;
    font-size: 13px;
    color: #707070;
    text-align: center;
}
</style>
</head>

<body>

<h2>Clinic Records</h2>    

    <p>
        This website is a replication of the “MediBuzz System,” designed to give students a preview of how the school clinic processes and saves student information.
    </p>

<button onclick="clearData()">Clear All</button>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Section</th>
                <th>Reason</th>
                <th>Phone</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function loadData() {
    const records = JSON.parse(localStorage.getItem("clinicRecords")) || [];
    const tableBody = document.getElementById("tableBody");

    tableBody.innerHTML = "";

    records.forEach(r => {
        tableBody.innerHTML += `
            <tr>
                <td>${r.studentId}</td>
                <td>${r.name}</td>
                <td>${r.section}</td>
                <td>${r.reason}</td>
                <td>${r.phone}</td>
            </tr>
        `;
    });
}

function clearData() {
    localStorage.removeItem("clinicRecords");
    loadData();
}

loadData();
</script>

</body>
</html>
